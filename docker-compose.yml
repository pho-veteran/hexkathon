services:
  backend:
    build: ./backend
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      STORAGE_BACKEND: s3
      STORAGE_BUCKET: ${STORAGE_BUCKET:-study-buddy-bucket}
      USERSTORE_BACKEND: dynamodb
      DOCUMENTS_TABLE: ${DOCUMENTS_TABLE:-documents}
      CHAT_MESSAGES_TABLE: ${CHAT_MESSAGES_TABLE:-chat-messages}
      FLASHCARD_SETS_TABLE: ${FLASHCARD_SETS_TABLE:-flashcard-sets}
      QUIZZES_TABLE: ${QUIZZES_TABLE:-quizzes}
      BATTLE_SESSIONS_TABLE: ${BATTLE_SESSIONS_TABLE:-battle-sessions}
      AI_BACKEND: bedrock
      AI_MODEL_ID: ${AI_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      VECTOR_BACKEND: bedrock_kb
      VECTOR_BEDROCK_KB_ID: ${VECTOR_BEDROCK_KB_ID:-test-kb}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:-}
    env_file:
      - .env
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/src:/app/src
      - ./backend/lambda_handler.py:/app/lambda_handler.py

  backend-tests:
    build: ./backend
    working_dir: /app
    environment:
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      STORAGE_BACKEND: s3
      STORAGE_BUCKET: ${STORAGE_BUCKET:-study-buddy-bucket}
      USERSTORE_BACKEND: dynamodb
      DOCUMENTS_TABLE: ${DOCUMENTS_TABLE:-documents}
      CHAT_MESSAGES_TABLE: ${CHAT_MESSAGES_TABLE:-chat-messages}
      FLASHCARD_SETS_TABLE: ${FLASHCARD_SETS_TABLE:-flashcard-sets}
      QUIZZES_TABLE: ${QUIZZES_TABLE:-quizzes}
      BATTLE_SESSIONS_TABLE: ${BATTLE_SESSIONS_TABLE:-battle-sessions}
      AI_BACKEND: bedrock
      AI_MODEL_ID: ${AI_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      VECTOR_BACKEND: bedrock_kb
      VECTOR_BEDROCK_KB_ID: ${VECTOR_BEDROCK_KB_ID:-test-kb}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    env_file:
      - .env
    command: pytest tests -v

  frontend:
    build: ./frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-}
      VITE_COGNITO_USER_POOL_ID: ${VITE_COGNITO_USER_POOL_ID:-}
      VITE_COGNITO_USER_POOL_DOMAIN: ${VITE_COGNITO_USER_POOL_DOMAIN:-}
      VITE_COGNITO_REGION: ${VITE_COGNITO_REGION:-ap-southeast-1}
      VITE_REDIRECT_URI: ${VITE_REDIRECT_URI:-http://localhost:5173}
      VITE_SIGNOUT_URI: ${VITE_SIGNOUT_URI:-http://localhost:5173}
    env_file:
      - .env
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/eslint.config.js:/app/eslint.config.js
      - ./frontend/src/index.css:/app/src/index.css
      - ./frontend/src/assets:/app/src/assets
    depends_on:
      - backend
