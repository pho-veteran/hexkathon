services:
  backend-tests:
    build: ./backend
    working_dir: /app
    environment:
      AWS_REGION: ap-southeast-1
      STORAGE_BACKEND: s3
      STORAGE_BUCKET: test-bucket
      USERSTORE_BACKEND: dynamodb
      DOCUMENTS_TABLE: documents
      CHAT_MESSAGES_TABLE: chat-messages
      FLASHCARD_SETS_TABLE: flashcard-sets
      QUIZZES_TABLE: quizzes
      BATTLE_SESSIONS_TABLE: battle-sessions
      AI_BACKEND: bedrock
      AI_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
      VECTOR_BACKEND: bedrock_kb
      VECTOR_BEDROCK_KB_ID: test-kb
      CORS_ORIGINS: http://localhost:5173
    command: pytest tests -v

  frontend:
    build: ./frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_COGNITO_CLIENT_ID: dummy-client-id
      VITE_COGNITO_USER_POOL_ID: dummy-pool-id
      VITE_COGNITO_USER_POOL_DOMAIN: dummy-domain
      VITE_COGNITO_REGION: ap-southeast-1
      VITE_REDIRECT_URI: http://localhost:5173
      VITE_SIGNOUT_URI: http://localhost:5173
    command: npm run build
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/eslint.config.js:/app/eslint.config.js
      - ./frontend/src/index.css:/app/src/index.css
      - ./frontend/src/assets:/app/src/assets
